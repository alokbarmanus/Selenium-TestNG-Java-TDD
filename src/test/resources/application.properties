###--- Application Configuration ---
### Common framework properties shared across all environments.
### Environment-specific overrides go in env/{env}/env.properties

###====== Application Properties ======

# Default base URL (overridable in env.properties)
app.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

###====== Browser Properties ======

# Default browser (overridable in env.properties): chrome | edge | firefox
browser.name=chrome

# Headless mode (true/false)
headless=false

# Selenium Grid URL (leave blank to run locally, set to enable Grid e.g. http://localhost:4444)
# grid.url=http://localhost:4444

###====== Viewport Properties ======

# Viewport mode: dynamic (fits screen) or fixed (uses width/height below)
viewport.mode=dynamic

# Used when viewport.mode=fixed
viewport.width=1920
viewport.height=1080

# Offsets subtracted from screen size in dynamic mode
viewport.width.offset=16
viewport.height.offset=96

###====== Retry Properties ======

# Number of times a failed scenario is retried before being marked as failed (0 = no retry)
retry.count=1
