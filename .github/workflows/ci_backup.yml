name: Java CI (BACKUP - disabled)

# This file is kept for reference only. All triggers removed to prevent it
# from running alongside ci.yml. To restore, copy triggers from ci.yml.
on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run TestNG Selenium suite"
        required: false
        default: false
        type: boolean
      test_env:
        description: "Target environment for suite"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - sit
          - uat
      thread_count:
        description: "Number of parallel Chrome nodes / test threads"
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"

# Cancel any in-progress run for the same branch/PR when a new one starts.
# Also makes the Cancel button in the UI actually stop the run immediately.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -ntp -DskipTests compile test-compile

  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B -ntp -DskipTests verify sonar:sonar \
            -Dsonar.projectKey=alokbarmanus \
            -Dsonar.organization=alokbarmanus \
            -Dsonar.host.url=https://sonarcloud.io

  test:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Selenium Grid with video recording
        env:
          THREAD_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.thread_count || '1' }}
        run: |
          mkdir -p ${{ github.workspace }}/videos
          chmod 777 ${{ github.workspace }}/videos
          docker network create grid

          # Start Hub (the central router tests connect to)
          docker run -d --name selenium-hub \
            --network grid \
            -p 4444:4444 \
            selenium/hub:latest

          # Start N Chrome nodes + N video sidecars (one per node, one VNC display each)
          for i in $(seq 1 $THREAD_COUNT); do
            docker run -d --name chrome-$i \
              --network grid \
              --shm-size=2g \
              -e SE_EVENT_BUS_HOST=selenium-hub \
              -e SE_EVENT_BUS_PUBLISH_PORT=4442 \
              -e SE_EVENT_BUS_SUBSCRIBE_PORT=4443 \
              -e SE_VNC_NO_PASSWORD=1 \
              -e SE_NODE_SESSION_TIMEOUT=300 \
              selenium/node-chrome:latest

            docker run -d --name video-$i \
              --network grid \
              -e DISPLAY_CONTAINER_NAME=chrome-$i \
              -e SE_VIDEO_FILE_NAME=auto \
              -v ${{ github.workspace }}/videos:/videos \
              selenium/video:latest
          done

          echo "Waiting for all $THREAD_COUNT node(s) to register with the Hub..."
          for attempt in $(seq 1 30); do
            READY=$(curl -s http://localhost:4444/status | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for n in d.get('value',{}).get('nodes',[]) if n.get('availability')=='UP'))" 2>/dev/null || echo 0)
            if [ "$READY" -ge "$THREAD_COUNT" ]; then
              echo "Selenium Grid ready: $READY/$THREAD_COUNT node(s) UP."
              break
            fi
            echo "Attempt $attempt: $READY/$THREAD_COUNT nodes ready, waiting 5s..."
            sleep 5
          done

      - name: Run TestNG suite on Selenium Grid
        env:
          THREAD_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.thread_count || '1' }}
          TEST_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }}
        run: |
          mvn -B -ntp verify \
            -Denv=$TEST_ENV \
            -Dgrid.url=http://localhost:4444 \
            -Dthread.count=$THREAD_COUNT

      - name: Stop video recording
        if: always()
        env:
          THREAD_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.thread_count || '1' }}
        run: |
          # Stop Chrome nodes first — VNC disconnects, signalling ffmpeg in each video container to finalise its MP4
          for i in $(seq 1 $THREAD_COUNT); do
            docker stop chrome-$i || true
          done

          echo "Waiting for $THREAD_COUNT video container(s) to finalise recordings..."
          for i in $(seq 1 $THREAD_COUNT); do
            timeout 30 docker wait video-$i 2>/dev/null || docker stop video-$i || true
          done

          docker stop selenium-hub || true
          docker network rm grid || true

          echo "=== Videos directory ==="
          ls -lh ${{ github.workspace }}/videos/ || echo "Videos directory is empty"

      - name: Upload test reports and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }}
          path: |
            target/surefire-reports
            target/extent-reports
            target/cucumber-reports
            test-output
            ${{ github.workspace }}/videos/
